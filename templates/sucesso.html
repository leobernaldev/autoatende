    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0a0e1a; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .box { text-align:center; padding:60px 40px; }

<body>
<div class="box">
    <div class="icon">🎉</div>
    <h1>Pagamento confirmado!</h1>
    <p>Seu plano está sendo ativado. Em instantes você já terá acesso completo!</p>
    <a href="/dashboard">Ir para o Dashboard</a>
</div>
<script>
    const params = new URLSearchParams(window.location.search);
    const plano = params.get('plano');
    const uid = params.get('uid');
    if (uid && plano) {
        const db = firebase.firestore();
        db.collection('usuarios').doc(uid).set({
            plano: plano,
            status: 'active',
            ativadoEm: new Date().toISOString()
        }, { merge: true });
    }
</script>
</body>
