<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Clínica Bianca Bernal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f9f5f0; color: #333; }

        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2d6a4f, #40916c);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 360px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-box h1 { font-size: 22px; color: #2d6a4f; margin-bottom: 6px; }
        .login-box p { color: #888; font-size: 14px; margin-bottom: 28px; }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #d8f3dc;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
            transition: border 0.2s;
        }
        .login-box input:focus { border-color: #40916c; }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #40916c, #2d6a4f);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .login-box button:hover { opacity: 0.9; }
        .login-error { color: #e63946; font-size: 13px; margin-top: 10px; display: none; }

        .painel { display: none; }
        .painel-header {
            background: linear-gradient(135deg, #2d6a4f, #40916c);
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .painel-header h1 { font-size: 20px; }
        .painel-header p { font-size: 13px; opacity: 0.8; margin-top: 3px; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .painel-content { padding: 40px; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            flex: 1;
            min-width: 160px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            text-align: center;
        }
        .stat-card .numero { font-size: 36px; font-weight: 700; color: #2d6a4f; }
        .stat-card .label { font-size: 14px; color: #888; margin-top: 4px; }

        .agendamentos-section h2 { font-size: 20px; color: #2d6a4f; margin-bottom: 20px; }
        .agendamento-card {
            background: white;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .agendamento-info h3 { font-size: 16px; color: #333; margin-bottom: 6px; }
        .agendamento-info p { font-size: 14px; color: #777; }
        .agendamento-data { font-size: 12px; color: #aaa; text-align: right; }
        .status-badge {
            background: #d8f3dc;
            color: #2d6a4f;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .vazio {
            text-align: center;
            padding: 60px;
            color: #aaa;
            font-size: 16px;
        }
        .vazio span { font-size: 48px; display: block; margin-bottom: 12px; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div class="login-screen" id="login-screen">
        <div class="login-box">
            <div style="font-size:40px;margin-bottom:12px;">🌿</div>
            <h1>Clínica Bianca Bernal</h1>
            <p>Painel de Agendamentos</p>
            <input type="password" id="senha" placeholder="Digite a senha" onkeypress="if(event.key==='Enter') entrar()">
            <button onclick="entrar()">Entrar</button>
            <p class="login-error" id="login-error">Senha incorreta. Tente novamente.</p>
        </div>
    </div>

    <!-- PAINEL PRINCIPAL -->
    <div class="painel" id="painel">
        <div class="painel-header">
            <div>
                <h1>🌿 Painel de Agendamentos</h1>
                <p>Clínica Bianca Bernal</p>
            </div>
            <button class="logout-btn" onclick="sair()">Sair</button>
        </div>
        <div class="painel-content">
            <div class="stats">
                <div class="stat-card">
                    <div class="numero" id="total">0</div>
                    <div class="label">Total de Agendamentos</div>
                </div>
                <div class="stat-card">
                    <div class="numero" id="hoje">0</div>
                    <div class="label">Recebidos Hoje</div>
                </div>
                <div class="stat-card">
                    <div class="numero" id="semana">0</div>
                    <div class="label">Esta Semana</div>
                </div>
            </div>
            <div class="agendamentos-section">
                <h2>📋 Agendamentos Recebidos</h2>
                <div id="lista-agendamentos"></div>
            </div>
        </div>
    </div>

    <script>
        const SENHA = 'bianca2025';

        function entrar() {
            const senha = document.getElementById('senha').value;
            if (senha === SENHA) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('painel').style.display = 'block';
                carregarAgendamentos();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function sair() {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('painel').style.display = 'none';
            document.getElementById('senha').value = '';
        }

        function carregarAgendamentos() {
            const agendamentos = JSON.parse(localStorage.getItem('agendamentos') || '[]');
            const lista = document.getElementById('lista-agendamentos');

            document.getElementById('total').textContent = agendamentos.length;

            const hoje = new Date().toDateString();
            const semanaAtras = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            document.getElementById('hoje').textContent = agendamentos.filter(a => new Date(a.data).toDateString() === hoje).length;
            document.getElementById('semana').textContent = agendamentos.filter(a => new Date(a.data) >= semanaAtras).length;

            if (agendamentos.length === 0) {
                lista.innerHTML = '<div class="vazio"><span>📭</span>Nenhum agendamento ainda.</div>';
                return;
            }

            lista.innerHTML = agendamentos.slice().reverse().map(a => `
                <div class="agendamento-card">
                    <div class="agendamento-info">
                        <h3>👤 ${a.nome}</h3>
                        <p>📞 ${a.telefone} &nbsp;|&nbsp; 🕐 ${a.horario}</p>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <span class="status-badge">✅ Pendente confirmação</span>
                        <div class="agendamento-data">${new Date(a.data).toLocaleDateString('pt-BR')}<br>${new Date(a.data).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
